<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Signal Hub · Landing Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Schoolbell&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'ChillHuoFangSong';
      src: url('./assets/ChillHuoFangSong_Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --primary: #F07040;
      --accent: #2B7FD8;
      --decor: #CC2936;
      --cream: #FFFDF9;
      --cream-dark: #F9F8F6;
      --cream-warm: #FFF3EE;
      --ink: #1A1A2E;
      --ink-light: #4A4A5A;
      --ink-faint: #8A8A9A;
      --line: rgba(26, 26, 46, .1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--accent); color: #fff; }

    img { display: block; max-width: 100%; }

    .site-shell {
      min-height: 100vh;
      overflow: hidden;
      background:
        linear-gradient(90deg, rgba(240,112,64,.05) 1px, transparent 1px),
        linear-gradient(180deg, rgba(43,127,216,.045) 1px, transparent 1px),
        var(--cream);
      background-size: 72px 72px;
    }

    .top-nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: clamp(18px, 3vw, 42px);
      min-height: 68px;
      padding: 0 clamp(18px, 4vw, 64px);
      background: rgba(255, 253, 249, .9);
      border-bottom: 1px solid rgba(26,26,46,.07);
      backdrop-filter: blur(14px);
      overflow-x: auto;
    }

    .top-nav::-webkit-scrollbar { display: none; }

    .brand-mark {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--ink);
      text-decoration: none;
      white-space: nowrap;
    }

    .brand-mark::before {
      content: '';
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--primary);
      box-shadow: 16px 0 0 var(--accent), 32px 0 0 var(--decor);
      margin-right: 28px;
    }

    .brand-name {
      font-family: 'ChillHuoFangSong', 'Noto Serif SC', serif;
      font-size: .98rem;
      font-weight: 900;
      letter-spacing: .01em;
    }

    .nav-tabs {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-left: auto;
      flex: 0 0 auto;
    }

    .nav-tabs a {
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      color: var(--ink-light);
      text-decoration: none;
      font-size: .76rem;
      font-weight: 600;
      transition: background .2s, color .2s, transform .2s;
    }

    .nav-tabs a:hover {
      color: var(--ink);
      background: rgba(43,127,216,.08);
      transform: translateY(-1px);
    }

    .nav-tabs a.active {
      color: #fff;
      background: var(--accent);
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.12fr) minmax(310px, .88fr);
      align-items: center;
      gap: clamp(42px, 6vw, 92px);
      min-height: calc(100svh - 108px);
      max-width: 1380px;
      margin: 0 auto;
      padding: clamp(46px, 8vh, 96px) clamp(22px, 5vw, 76px) clamp(34px, 5vh, 54px);
    }

    .hero-copy {
      position: relative;
      z-index: 2;
      max-width: 760px;
    }

    .hero-kicker {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: clamp(18px, 3vw, 30px);
      color: var(--accent);
      font-size: .76rem;
      font-weight: 800;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .hero-kicker::before {
      content: '';
      width: 40px;
      height: 3px;
      background: var(--primary);
    }

    .kinetic-title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      column-gap: .18em;
      row-gap: .08em;
      margin-bottom: clamp(22px, 3vw, 34px);
      font-family: 'Noto Serif SC', Georgia, serif;
      font-size: clamp(3.45rem, 8.3vw, 8.8rem);
      line-height: .88;
      letter-spacing: 0;
      color: var(--ink);
    }

    .kinetic-title .word {
      display: inline-flex;
      white-space: nowrap;
    }

    .kinetic-title span span {
      display: inline-block;
      font-weight: 300;
      transition: color .35s ease, font-weight .35s ease, transform .35s ease;
    }

    .kinetic-title span span:hover,
    .kinetic-title span span.active {
      color: var(--primary);
      font-weight: 900;
      transform: translateY(-.035em);
    }

    .hero-subtitle {
      max-width: 610px;
      font-family: 'ChillHuoFangSong', 'Noto Serif SC', serif;
      font-size: clamp(1.28rem, 2.2vw, 2.05rem);
      font-weight: 900;
      line-height: 1.42;
      color: var(--ink);
    }

    .hero-subtitle strong {
      color: var(--accent);
      font-weight: 900;
    }

    .hero-note {
      max-width: 520px;
      margin-top: clamp(18px, 3vw, 30px);
      color: var(--ink-light);
      font-size: clamp(.95rem, 1.2vw, 1.08rem);
      line-height: 1.9;
    }

    .hero-actions {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-top: clamp(26px, 4vw, 42px);
    }

    .cta-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 24px;
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font: inherit;
      font-size: .92rem;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease;
      box-shadow: 0 14px 30px rgba(43,127,216,.2);
    }

    .cta-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 38px rgba(43,127,216,.28);
    }

    .text-link {
      display: inline-flex;
      align-items: center;
      min-height: 48px;
      color: var(--ink);
      text-decoration: none;
      font-size: .88rem;
      font-weight: 800;
      border-bottom: 2px solid rgba(240,112,64,.45);
      transition: border-color .2s ease;
    }

    .text-link:hover { border-color: var(--primary); }

    .hero-visual {
      position: relative;
      min-height: clamp(500px, 64vh, 720px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .screen-stage {
      position: relative;
      width: min(500px, 100%);
      transform: translateX(clamp(0px, 2vw, 26px)) rotate(1.5deg);
    }

    .screen-stage::before {
      content: '';
      position: absolute;
      inset: -26px 36px 28px -34px;
      border: 2px dashed rgba(240,112,64,.36);
      border-radius: 34px;
      transform: rotate(-4deg);
    }

    .screen-stage::after {
      content: '20 hits';
      position: absolute;
      right: -22px;
      top: 14%;
      padding: 7px 13px;
      border-radius: 999px;
      background: var(--decor);
      color: #fff;
      font-family: 'Schoolbell', cursive;
      font-size: 1rem;
      transform: rotate(8deg);
      box-shadow: 0 10px 22px rgba(204,41,54,.18);
    }

    .screenshot-frame {
      position: relative;
      overflow: hidden;
      border-radius: 30px;
      border: 10px solid #fff;
      background: #fff;
      box-shadow: 0 32px 80px rgba(26,26,46,.16);
    }

    .screenshot-frame img {
      width: 100%;
      aspect-ratio: 1076 / 1556;
      object-fit: cover;
      object-position: center top;
    }

    .signal-card {
      position: absolute;
      left: -58px;
      bottom: 12%;
      width: min(280px, 54vw);
      padding: 18px 18px 16px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid rgba(26,26,46,.08);
      box-shadow: 0 20px 54px rgba(26,26,46,.13);
      transform: rotate(-4deg);
    }

    .signal-card .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-bottom: 10px;
      color: var(--decor);
      font-size: .68rem;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .signal-card .label::before {
      content: '';
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--decor);
    }

    .signal-card p {
      color: var(--ink);
      font-size: .88rem;
      font-weight: 800;
      line-height: 1.55;
    }

    .signal-card span {
      display: block;
      margin-top: 8px;
      color: var(--ink-faint);
      font-size: .72rem;
      line-height: 1.6;
    }

    .next-peek {
      display: grid;
      grid-template-columns: .38fr 1fr;
      gap: clamp(22px, 4vw, 56px);
      align-items: center;
      max-width: 1380px;
      margin: 0 auto;
      padding: 18px clamp(22px, 5vw, 76px) 28px;
      border-top: 1px solid rgba(26,26,46,.08);
    }

    .next-peek .index {
      font-family: 'Schoolbell', cursive;
      color: var(--primary);
      font-size: 1rem;
    }

    .peek-row {
      display: flex;
      gap: 10px;
      overflow: hidden;
    }

    .peek-pill {
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 34px;
      padding: 0 13px;
      border-radius: 999px;
      background: var(--cream-dark);
      color: var(--ink-light);
      font-size: .76rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .peek-pill:nth-child(2) { color: var(--accent); background: #F5FAFF; }
    .peek-pill:nth-child(4) { color: var(--decor); background: #FFF6F7; }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }

    @media (max-width: 980px) {
      .top-nav { min-height: 62px; }
      .nav-tabs { margin-left: 0; }
      .hero {
        grid-template-columns: 1fr;
        min-height: auto;
        padding-top: 42px;
      }
      .hero-copy { max-width: 100%; }
      .hero-visual {
        min-height: auto;
        justify-content: flex-start;
      }
      .screen-stage {
        width: min(430px, 82vw);
        transform: none;
      }
      .signal-card {
        left: auto;
        right: -18px;
        bottom: 8%;
      }
      .next-peek { grid-template-columns: 1fr; }
    }

    @media (max-width: 620px) {
      .top-nav {
        align-items: flex-start;
        flex-direction: column;
        gap: 8px;
        padding-top: 12px;
        padding-bottom: 12px;
      }
      .brand-mark::before { transform: scale(.84); transform-origin: left center; }
      .nav-tabs {
        width: 100%;
        overflow-x: auto;
        padding-bottom: 2px;
      }
      .hero {
        gap: 34px;
        padding-inline: 18px;
      }
      .kinetic-title {
        font-size: clamp(3rem, 18vw, 4.7rem);
      }
      .hero-actions { display: grid; }
      .cta-button,
      .text-link { width: 100%; }
      .text-link { justify-content: center; }
      .screen-stage { width: min(360px, 86vw); }
      .screen-stage::before {
        inset: -16px 22px 20px -18px;
        border-radius: 24px;
      }
      .screen-stage::after {
        right: -8px;
        top: 8%;
      }
      .signal-card {
        position: relative;
        right: auto;
        bottom: auto;
        width: 100%;
        margin-top: 14px;
        transform: rotate(-2deg);
      }
      .next-peek {
        padding-inline: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="site-shell">
    <nav class="top-nav" aria-label="Primary">
      <a class="brand-mark" href="#">
        <span class="brand-name">YouTube Signal Hub</span>
      </a>
      <div class="nav-tabs" role="list">
        <a class="active" href="#hero" role="listitem">Hero</a>
        <a href="#rules" role="listitem">监控规则</a>
        <a href="#signals" role="listitem">爆款信号</a>
        <a href="#delivery" role="listitem">通知送达</a>
      </div>
    </nav>

    <main>
      <section class="hero" id="hero">
        <div class="hero-copy">
          <p class="hero-kicker">CUSTOM CHANNEL RADAR</p>
          <h1 class="kinetic-title" aria-label="YouTube Signal Hub">
            <span class="word">YouTube</span>
            <span class="word">Signal</span>
            <span class="word">Hub</span>
          </h1>
          <p class="hero-subtitle">
            <strong>你的爆款视频，已送达。</strong><br>
            定制频道监控规则，让信号主动找上门。
          </p>
          <p class="hero-note">
            从频道池、播放量阈值到通知渠道，把“刷榜找灵感”变成一套会主动提醒你的内容雷达。
          </p>
          <div class="hero-actions">
            <a class="cta-button" href="#rules">配置监控规则</a>
            <a class="text-link" href="#signals">查看信号样例</a>
          </div>
        </div>

        <div class="hero-visual" aria-label="爆款监测通知截图">
          <div class="screen-stage">
            <figure class="screenshot-frame">
              <img src="./assets/youtube-signal-hub-screenshot.jpg" alt="YouTube Signal Hub 爆款监测通知截图">
            </figure>
            <aside class="signal-card">
              <div class="label">Rule triggered</div>
              <p>总播放量规则已触发，20 个视频命中阈值。</p>
              <span>通知不再等你刷新页面，爆款信号会自己抵达。</span>
            </aside>
          </div>
        </div>
      </section>

      <section class="next-peek" id="rules" aria-label="下一段内容预览">
        <div class="index">Next · monitoring rules</div>
        <div class="peek-row">
          <span class="peek-pill">频道池</span>
          <span class="peek-pill">播放量阈值</span>
          <span class="peek-pill">关键词命中</span>
          <span class="peek-pill">异常爆发</span>
          <span class="peek-pill">通知渠道</span>
        </div>
      </section>
    </main>
  </div>

  <script>
    document.querySelectorAll('.kinetic-title .word').forEach((word) => {
      const chars = Array.from(word.textContent);
      word.textContent = '';
      chars.forEach((char) => {
        const span = document.createElement('span');
        span.textContent = char;
        word.appendChild(span);
      });
    });

    const letters = Array.from(document.querySelectorAll('.kinetic-title .word span'));
    let activeIndex = 0;

    function activateLetter(index) {
      letters.forEach((letter, i) => letter.classList.toggle('active', i === index));
    }

    letters.forEach((letter, index) => {
      letter.addEventListener('mouseenter', () => activateLetter(index));
    });

    window.setInterval(() => {
      activeIndex = (activeIndex + 1) % letters.length;
      activateLetter(activeIndex);
    }, 950);
  </script>
</body>
</html>
