<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Signal Hub · Landing Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@400;700;900&family=Schoolbell&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'ChillHuoFangSong';
      src: url('./assets/ChillHuoFangSong_Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --primary: #F07040;
      --accent: #2B7FD8;
      --decor: #CC2936;
      --cream: #FFFDF9;
      --cream-dark: #F9F8F6;
      --ink: #1A1A2E;
      --ink-light: #4A4A5A;
      --ink-faint: #8A8A9A;
      --line: rgba(26, 26, 46, .08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: var(--accent); color: #fff; }

    img { display: block; max-width: 100%; }

    .page {
      min-height: 100vh;
      background:
        radial-gradient(circle at 72% 42%, rgba(43,127,216,.055), transparent 28%),
        var(--cream);
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      height: 58px;
      padding: 0 clamp(26px, 4vw, 52px);
      background: rgba(255,253,249,.88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .logo {
      color: var(--accent);
      font-family: 'ChillHuoFangSong', 'Noto Serif SC', serif;
      font-size: 1rem;
      font-weight: 900;
      text-decoration: none;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: clamp(18px, 3vw, 34px);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tabs a {
      color: var(--ink);
      font-size: .78rem;
      font-weight: 800;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
      transition: color .2s ease;
    }

    .tabs a:hover,
    .tabs a.active { color: var(--accent); }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .72fr);
      align-items: center;
      gap: clamp(52px, 7vw, 108px);
      width: min(1120px, calc(100% - 64px));
      min-height: calc(100svh - 58px);
      margin: 0 auto;
      padding: clamp(78px, 12vh, 132px) 0 clamp(54px, 8vh, 88px);
    }

    .eyebrow {
      margin-bottom: clamp(24px, 4vw, 36px);
      color: var(--accent);
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .kinetic-title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      column-gap: .22em;
      row-gap: .05em;
      margin-bottom: clamp(24px, 4vw, 38px);
      color: var(--ink);
      font-family: 'Noto Serif SC', Georgia, serif;
      font-size: clamp(4.1rem, 8.6vw, 7.6rem);
      line-height: .9;
      letter-spacing: 0;
    }

    .kinetic-title .word {
      display: inline-flex;
      white-space: nowrap;
    }

    .kinetic-title .char {
      display: inline-block;
      font-weight: 500;
      transition: color .35s ease, font-weight .35s ease;
    }

    .kinetic-title .char:hover,
    .kinetic-title .char.active {
      color: var(--accent);
      font-weight: 900;
    }

    .subtitle {
      max-width: 610px;
      color: var(--ink);
      font-family: 'ChillHuoFangSong', 'Noto Serif SC', serif;
      font-size: clamp(1.32rem, 2vw, 1.75rem);
      font-weight: 900;
      line-height: 1.55;
    }

    .subtitle mark {
      padding: 0 .14em .02em;
      color: inherit;
      background: linear-gradient(180deg, transparent 58%, rgba(43,127,216,.18) 58%);
    }

    .body-copy {
      max-width: 540px;
      margin-top: 22px;
      color: var(--ink-light);
      font-size: .98rem;
      line-height: 1.9;
    }

    .proof-line {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 34px;
      color: var(--ink-faint);
      font-size: .76rem;
      font-weight: 700;
    }

    .proof-line::before {
      content: '';
      width: 42px;
      height: 2px;
      background: var(--primary);
    }

    .visual {
      position: relative;
      justify-self: end;
      width: min(360px, 100%);
    }

    .visual::before {
      content: '爆款预警';
      position: absolute;
      z-index: 2;
      left: -28px;
      top: 28%;
      padding: 7px 13px;
      border-radius: 999px;
      background: #fff;
      color: var(--primary);
      font-family: 'Schoolbell', cursive;
      font-size: .9rem;
      font-weight: 700;
      box-shadow: 0 14px 32px rgba(26,26,46,.08);
    }

    .visual::after {
      content: '20 videos';
      position: absolute;
      z-index: 2;
      right: -22px;
      top: 8%;
      padding: 8px 14px;
      border-radius: 999px;
      background: #fff;
      color: var(--decor);
      font-size: .78rem;
      font-weight: 900;
      box-shadow: 0 14px 32px rgba(26,26,46,.08);
    }

    .shot {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 30px 80px rgba(26,26,46,.1);
    }

    .shot img {
      width: 100%;
      aspect-ratio: 1076 / 1556;
      object-fit: cover;
      object-position: center top;
    }

    .next {
      width: min(1120px, calc(100% - 64px));
      margin: 0 auto;
      padding: 18px 0 30px;
      border-top: 1px solid var(--line);
    }

    .next-list {
      display: flex;
      gap: 10px;
      overflow: hidden;
    }

    .next-list span {
      flex: 0 0 auto;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--cream-dark);
      color: var(--ink-light);
      font-size: .72rem;
      font-weight: 800;
      white-space: nowrap;
    }

    .next-list span:nth-child(2) {
      color: var(--accent);
      background: #F5FAFF;
    }

    .next-list span:nth-child(4) {
      color: var(--decor);
      background: #FFF6F7;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        width: min(680px, calc(100% - 42px));
        min-height: auto;
      }
      .visual {
        justify-self: start;
        width: min(390px, 86vw);
      }
      .next { width: min(680px, calc(100% - 42px)); }
    }

    @media (max-width: 620px) {
      .nav {
        height: auto;
        align-items: flex-start;
        flex-direction: column;
        padding-top: 16px;
        padding-bottom: 14px;
      }
      .tabs {
        width: 100%;
        padding-bottom: 2px;
      }
      .hero {
        padding-top: 56px;
      }
      .kinetic-title {
        font-size: clamp(3.1rem, 17vw, 4.6rem);
      }
      .visual::before {
        left: 14px;
        top: auto;
        bottom: 18px;
      }
      .visual::after {
        right: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav" aria-label="Primary">
      <a class="logo" href="#hero">YouTube Signal Hub</a>
      <div class="tabs" role="list">
        <a class="active" href="#hero" role="listitem">关系</a>
        <a href="#rules" role="listitem">规则</a>
        <a href="#signals" role="listitem">被看见</a>
        <a href="#delivery" role="listitem">通知</a>
      </div>
    </nav>

    <main>
      <section class="hero" id="hero">
        <div class="copy">
          <p class="eyebrow">YOUTUBE RADAR × AI</p>
          <h1 class="kinetic-title" aria-label="YouTube Signal Hub">
            <span class="word">YouTube</span>
            <span class="word">Signal</span>
            <span class="word">Hub</span>
          </h1>
          <p class="subtitle">
            <mark>你的爆款视频，已送达。</mark><br>
            定制频道监控规则，让信号主动找上门。
          </p>
          <p class="body-copy">
            不再反复刷新频道和排行榜。设置频道池、播放量阈值与通知渠道，系统会把值得看的变化安静地送到你面前。
          </p>
          <p class="proof-line">channel signals, delivered quietly</p>
        </div>

        <figure class="visual" aria-label="爆款监测通知截图">
          <div class="shot">
            <img src="./assets/youtube-signal-hub-screenshot.jpg" alt="YouTube Signal Hub 爆款监测通知截图">
          </div>
        </figure>
      </section>

      <section class="next" id="rules" aria-label="下一段内容预览">
        <div class="next-list">
          <span>频道池</span>
          <span>播放量阈值</span>
          <span>关键词命中</span>
          <span>异常爆发</span>
          <span>通知渠道</span>
        </div>
      </section>
    </main>
  </div>

  <script>
    document.querySelectorAll('.kinetic-title .word').forEach((word) => {
      const chars = Array.from(word.textContent);
      word.textContent = '';
      chars.forEach((char) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = char;
        word.appendChild(span);
      });
    });

    const chars = Array.from(document.querySelectorAll('.kinetic-title .char'));
    let activeIndex = 0;

    function activate(index) {
      chars.forEach((char, i) => char.classList.toggle('active', i === index));
    }

    chars.forEach((char, index) => {
      char.addEventListener('mouseenter', () => activate(index));
    });

    window.setInterval(() => {
      activeIndex = (activeIndex + 1) % chars.length;
      activate(activeIndex);
    }, 1100);
  </script>
</body>
</html>
