<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Signal Hub · Landing Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900&family=Noto+Sans+SC:wght@300;400;500;700;900&family=Noto+Serif+SC:wght@300;400;700;900&family=Schoolbell&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'ChillHuoFangSong';
      src: url('./assets/ChillHuoFangSong_Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --primary: #F07040;
      --accent: #2B7FD8;
      --decor: #CC2936;
      --cream: #FFFDF9;
      --cream-dark: #F9F8F6;
      --ink: #1A1A2E;
      --ink-light: #4A4A5A;
      --ink-faint: #8A8A9A;
      --line: rgba(26, 26, 46, .08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      min-height: 100vh;
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Helvetica Neue', sans-serif;
      color: var(--ink);
      background: var(--cream);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(240,112,64,.18); color: var(--ink); }

    img { display: block; max-width: 100%; }

    .page {
      min-height: 100vh;
      background:
        radial-gradient(circle at 72% 42%, rgba(43,127,216,.055), transparent 28%),
        var(--cream);
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 28px;
      height: 58px;
      padding: 0 clamp(26px, 4vw, 52px);
      background: rgba(255,253,249,.88);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(12px);
    }

    .logo {
      color: var(--primary);
      font-family: 'Schoolbell', cursive;
      font-size: 1.32rem;
      font-weight: 700;
      line-height: 1;
      text-decoration: none;
      white-space: nowrap;
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: clamp(18px, 3vw, 34px);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tabs a {
      position: relative;
      color: var(--ink-light);
      font-size: .84rem;
      font-weight: 600;
      line-height: 1.2;
      text-decoration: none;
      white-space: nowrap;
      transition: color .2s ease;
    }

    .tabs a::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: -8px;
      height: 2px;
      border-radius: 999px;
      background: var(--primary);
      transform: scaleX(0);
      transform-origin: left;
      transition: transform .22s ease;
    }

    .tabs a:hover,
    .tabs a.active { color: var(--primary); }

    .tabs a:hover::after,
    .tabs a.active::after { transform: scaleX(1); }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .72fr);
      align-items: center;
      gap: clamp(52px, 7vw, 108px);
      width: min(1120px, calc(100% - 64px));
      min-height: calc(100svh - 58px);
      margin: 0 auto;
      padding: clamp(50px, 7vh, 84px) 0 clamp(110px, 14vh, 150px);
    }

    .eyebrow {
      margin-bottom: clamp(24px, 4vw, 36px);
      color: var(--primary);
      font-size: .72rem;
      font-weight: 900;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .kinetic-title {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      column-gap: .22em;
      row-gap: .05em;
      margin-bottom: clamp(24px, 4vw, 38px);
      color: var(--ink);
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(3rem, 7.8vw, 6rem);
      line-height: 1.08;
      letter-spacing: 0;
    }

    .kinetic-title .word {
      display: inline-flex;
      white-space: nowrap;
    }

    .kinetic-title .word:first-child {
      flex-basis: 100%;
    }

    .kinetic-title .word-signal {
      color: var(--decor);
    }

    .kinetic-title .char {
      display: inline-block;
      font-weight: 700;
      transition: font-weight .4s, color .4s, padding .4s;
      cursor: default;
    }

    .kinetic-title .char:hover,
    .kinetic-title .char.active {
      color: var(--primary);
      font-weight: 900;
      padding-inline: .06em;
    }

    .kinetic-title .word-signal .char:hover,
    .kinetic-title .word-signal .char.active {
      color: var(--decor);
    }

    .subtitle {
      max-width: 610px;
      color: var(--ink);
      font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', sans-serif;
      font-size: 1.05rem;
      font-weight: 400;
      line-height: 1.9;
    }

    .visual {
      position: relative;
      justify-self: end;
      width: min(320px, 100%);
    }

    .shot {
      position: relative;
      overflow: hidden;
      border-radius: 18px;
      background: #fff;
      box-shadow: 0 30px 80px rgba(26,26,46,.1);
    }

    .shot img {
      width: 100%;
      aspect-ratio: 1076 / 1556;
      object-fit: cover;
      object-position: center top;
    }

    .scene {
      display: flex;
      align-items: center;
      min-height: calc(100svh - 58px);
      scroll-margin-top: 58px;
      background: var(--cream-dark);
      border-top: 1px solid rgba(26,26,46,.05);
      padding: clamp(78px, 11vw, 132px) 0;
    }

    .scene-inner {
      display: grid;
      grid-template-columns: minmax(220px, .45fr) minmax(0, 1fr);
      gap: clamp(40px, 7vw, 92px);
      width: min(1120px, calc(100% - 64px));
      margin: 0 auto;
      align-items: start;
    }

    .section-kicker {
      display: block;
      margin-bottom: 16px;
      color: var(--primary);
      font-family: 'Schoolbell', cursive;
      font-size: clamp(2.6rem, 6vw, 5rem);
      font-weight: 700;
      line-height: .9;
    }

    .section-title {
      font-family: 'Noto Serif SC', serif;
      font-size: clamp(2.8rem, 6vw, 5rem);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 0;
    }

    .scene-lead {
      max-width: 280px;
      margin-top: 28px;
      color: var(--ink-light);
      font-size: .95rem;
      line-height: 1.9;
    }

    .pain-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .pain-card {
      min-height: 238px;
      padding: 28px 24px;
      background: #fff;
      border: 1px solid rgba(26,26,46,.06);
      border-radius: 8px;
      box-shadow: 0 14px 42px rgba(26,26,46,.045);
    }

    .pain-num {
      display: block;
      margin-bottom: 28px;
      color: rgba(240,112,64,.62);
      font-family: 'Schoolbell', cursive;
      font-size: 1.25rem;
      font-weight: 700;
      line-height: 1;
    }

    .pain-card h3 {
      margin-bottom: 14px;
      color: var(--ink);
      font-family: 'Noto Serif SC', serif;
      font-size: 1.32rem;
      font-weight: 900;
      line-height: 1.3;
    }

    .pain-card p {
      color: var(--ink-light);
      font-size: .88rem;
      line-height: 1.85;
    }

    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }

    @media (max-width: 900px) {
      .hero {
        grid-template-columns: 1fr;
        width: min(680px, calc(100% - 42px));
        min-height: auto;
      }
      .scene-inner {
        grid-template-columns: 1fr;
        width: min(680px, calc(100% - 42px));
      }
      .scene-lead {
        max-width: 520px;
      }
      .pain-grid {
        grid-template-columns: 1fr;
      }
      .visual {
        justify-self: start;
        width: min(340px, 82vw);
      }
    }

    @media (max-width: 620px) {
      .nav {
        height: auto;
        align-items: flex-start;
        flex-direction: column;
        padding-top: 16px;
        padding-bottom: 14px;
      }
      .tabs {
        width: 100%;
        padding-bottom: 2px;
      }
      .hero {
        padding-top: 56px;
      }
      .kinetic-title {
        font-size: clamp(3.35rem, 18vw, 5.1rem);
      }
      .scene {
        padding: 70px 0;
      }
      .pain-card {
        min-height: auto;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="nav" aria-label="Primary">
      <a class="logo" href="#hero">YouTube Signal Hub</a>
      <div class="tabs" role="list">
        <a class="active" href="#scene" role="listitem">现场</a>
        <a href="#rules" role="listitem">规则</a>
        <a href="#signals" role="listitem">被看见</a>
        <a href="#delivery" role="listitem">通知</a>
      </div>
    </nav>

    <main>
      <section class="hero" id="hero">
        <div class="copy">
          <p class="eyebrow">YOUTUBE RADAR × AI</p>
          <h1 class="kinetic-title" aria-label="YouTube Signal Hub">
            <span class="word">YouTube</span>
            <span class="word word-signal">Signal</span>
            <span class="word">Hub</span>
          </h1>
          <p class="subtitle">
            你的爆款视频已送达。<br>
            定制频道监控规则，让信号主动找上门。
          </p>
        </div>

        <figure class="visual" aria-label="爆款监测通知截图">
          <div class="shot">
            <img src="./assets/youtube-signal-hub-screenshot.jpg" alt="YouTube Signal Hub 爆款监测通知截图">
          </div>
        </figure>
      </section>

      <section class="scene" id="scene" aria-labelledby="scene-title">
        <div class="scene-inner">
          <div>
            <span class="section-kicker">01</span>
            <h2 class="section-title" id="scene-title">现场</h2>
            <p class="scene-lead">做频道定位时，我需要快速判断哪些对标内容真的在起势。</p>
          </div>

          <div class="pain-grid" aria-label="频道定位阶段的三个痛点">
            <article class="pain-card">
              <span class="pain-num">01</span>
              <h3>增量只能猜</h3>
              <p>免费插件只显示更新时间，看不到播放量增量，只能用发布时间和当前播放量粗略判断。</p>
            </article>

            <article class="pain-card">
              <span class="pain-num">02</span>
              <h3>数据逐条查</h3>
              <p>付费工具把信息堆在侧边栏里，高峰时要同时打开十几个视频标签页来回确认。</p>
            </article>

            <article class="pain-card">
              <span class="pain-num">03</span>
              <h3>低粉爆款会错过</h3>
              <p>真正有价值的信号随时可能爆发，靠人工刷视频很难稳定捕捉。</p>
            </article>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script>
    document.querySelectorAll('.kinetic-title .word').forEach((word) => {
      const chars = Array.from(word.textContent);
      word.textContent = '';
      chars.forEach((char) => {
        const span = document.createElement('span');
        span.className = 'char';
        span.textContent = char;
        word.appendChild(span);
      });
    });

    function activate(index) {
      const chars = Array.from(document.querySelectorAll('.kinetic-title .char'));
      chars.forEach((char, i) => char.classList.toggle('active', i === index));
    }

    document.querySelectorAll('.kinetic-title .char').forEach((char, index) => {
      char.addEventListener('mouseenter', () => activate(index));
      char.addEventListener('mouseleave', () => char.classList.remove('active'));
    });
  </script>
</body>
</html>
