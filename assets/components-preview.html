<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Serena Design System Components Preview</title>
  <style>
    @font-face {
      font-family: 'ChillHuoKai Con';
      src: url('./ChillHuoKai_ConRegular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    :root {
      --coral: #F07040;
      --coral-soft: #FFF3EE;
      --newyork-red: #CC2936;
      --sky-blue: #2B7FD8;
      --cream: #fefcf6;
      --cream-dark: #faf6eb;
      --ink: #1A1A2E;
      --ink-light: #4A4A5A;
      --ink-faint: #8A8A9A;
      --line: #e8e4dc;
      --panel: #fff;
      --shadow: 0 12px 34px rgba(26, 26, 46, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Spectral", "Noto Serif SC", Georgia, serif;
      color: var(--ink);
      background: var(--cream);
    }

    a { color: inherit; }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 284px minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 28px 22px;
      background: var(--ink);
      color: #fff;
      overflow-y: auto;
    }

    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .brand-lockup img {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid var(--coral);
      background: var(--cream);
    }

    .brand-title {
      margin: 0;
      font-family: 'ChillHuoKai Con', "Noto Serif SC", serif;
      font-size: 1.55rem;
      line-height: 1;
      font-weight: 400;
    }

    .brand-subtitle {
      margin: 4px 0 0;
      color: rgba(255,255,255,0.62);
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .search-box {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 8px;
      padding: 11px 12px;
      color: #fff;
      background: rgba(255,255,255,0.08);
      outline: none;
      font: inherit;
      font-size: 0.86rem;
    }

    .search-box:focus {
      border-color: var(--sky-blue);
      box-shadow: 0 0 0 3px rgba(43,127,216,0.24);
    }

    .filter-list {
      display: grid;
      gap: 8px;
      margin: 20px 0 28px;
    }

    .filter-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 7px;
      padding: 9px 10px;
      background: transparent;
      color: rgba(255,255,255,0.76);
      cursor: pointer;
      font: inherit;
      font-size: 0.8rem;
      text-align: left;
    }

    .filter-btn.active,
    .filter-btn:hover {
      background: var(--coral);
      border-color: var(--coral);
      color: #fff;
    }

    .toc {
      display: grid;
      gap: 8px;
      padding-bottom: 20px;
    }

    .toc a {
      display: grid;
      grid-template-columns: 30px minmax(0, 1fr);
      gap: 8px;
      align-items: center;
      text-decoration: none;
      color: rgba(255,255,255,0.68);
      font-size: 0.78rem;
      line-height: 1.35;
    }

    .toc a:hover { color: #fff; }

    .toc span {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 50%;
      color: var(--sky-blue);
      font-family: "Schoolbell", cursive;
    }

    .main {
      padding: 36px clamp(24px, 5vw, 64px) 72px;
    }

    .hero {
      min-height: 320px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 36px;
      align-items: end;
      padding: clamp(24px, 4vw, 48px);
      border: 2px solid var(--ink);
      background:
        linear-gradient(135deg, rgba(240,112,64,0.18), transparent 42%),
        linear-gradient(315deg, rgba(43,127,216,0.16), transparent 38%),
        #fff;
      box-shadow: var(--shadow);
    }

    .hero-kicker {
      display: inline-flex;
      width: fit-content;
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--coral);
      color: #fff;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      margin: 20px 0 16px;
      max-width: 780px;
      font-family: 'ChillHuoKai Con', "Noto Serif SC", serif;
      font-size: clamp(3.1rem, 8vw, 7rem);
      line-height: 0.98;
      font-weight: 400;
    }

    .hero p {
      max-width: 720px;
      margin: 0;
      color: var(--ink-light);
      font-size: clamp(1rem, 1.7vw, 1.28rem);
      line-height: 1.8;
    }

    .palette {
      display: grid;
      gap: 10px;
      align-self: stretch;
    }

    .swatch {
      display: flex;
      align-items: end;
      justify-content: space-between;
      min-height: 78px;
      padding: 14px;
      color: #fff;
      border-radius: 7px;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .swatch small { opacity: 0.82; font-weight: 600; }
    .swatch.coral { background: var(--coral); }
    .swatch.red { background: var(--newyork-red); }
    .swatch.blue { background: var(--sky-blue); }

    .section-heading {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 20px;
      margin: 46px 0 18px;
      border-bottom: 2px solid var(--ink);
      padding-bottom: 10px;
    }

    .section-heading h2 {
      margin: 0;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      line-height: 1.2;
    }

    .section-heading span {
      color: var(--ink-faint);
      font-size: 0.82rem;
    }

    .component-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 18px;
    }

    .component-card {
      min-height: 310px;
      display: grid;
      grid-template-rows: 180px auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 8px 24px rgba(26,26,46,0.05);
      overflow: hidden;
      scroll-margin-top: 20px;
    }

    .component-card[hidden] { display: none; }

    .preview {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 180px;
      padding: 18px;
      background: var(--cream-dark);
      overflow: hidden;
    }

    .component-card:nth-child(3n + 1) .preview { background: var(--coral-soft); }
    .component-card:nth-child(3n + 2) .preview { background: #eef6ff; }

    .meta {
      padding: 18px;
      border-top: 1px solid var(--line);
    }

    .meta-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .number {
      font-family: "Schoolbell", cursive;
      color: var(--coral);
      font-size: 1.35rem;
      line-height: 1;
    }

    .tag {
      padding: 3px 8px;
      border-radius: 999px;
      background: var(--cream-dark);
      color: var(--ink-light);
      font-size: 0.68rem;
      white-space: nowrap;
    }

    .meta h3 {
      margin: 0 0 8px;
      font-size: 1rem;
      line-height: 1.35;
    }

    .meta p {
      margin: 0;
      color: var(--ink-light);
      font-size: 0.78rem;
      line-height: 1.7;
    }

    .mini-card {
      width: min(220px, 100%);
      min-height: 112px;
      padding: 18px;
      border: 2px solid var(--ink);
      background: #fff;
      box-shadow: 8px 8px 0 var(--coral);
    }

    .mini-title {
      margin: 0 0 8px;
      font-weight: 800;
      font-size: 1rem;
      line-height: 1.2;
    }

    .mini-line {
      height: 7px;
      margin-top: 8px;
      border-radius: 999px;
      background: var(--line);
    }

    .mini-line.short { width: 58%; background: var(--sky-blue); }

    .quote-mark {
      font-family: 'ChillHuoKai Con', serif;
      font-size: 5rem;
      color: var(--coral);
      line-height: 0.7;
    }

    .quote-box {
      width: min(230px, 100%);
      text-align: center;
      font-size: 1rem;
      line-height: 1.6;
      color: var(--ink);
    }

    .code-box {
      width: min(236px, 100%);
      padding: 14px;
      border-radius: 8px;
      background: var(--ink);
      color: #fff;
      font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
      font-size: 0.72rem;
      line-height: 1.6;
      box-shadow: 0 10px 24px rgba(26,26,46,0.18);
    }

    .code-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      margin-right: 5px;
      border-radius: 50%;
      background: var(--coral);
    }

    .flow {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .flow span,
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 34px;
      padding: 7px 12px;
      border-radius: 999px;
      background: #fff;
      border: 1.5px solid var(--coral);
      color: var(--ink);
      font-size: 0.74rem;
      font-weight: 700;
    }

    .arrow { color: var(--sky-blue); font-weight: 900; }

    .table-preview {
      width: min(235px, 100%);
      border: 2px solid var(--ink);
      background: #fff;
    }

    .table-preview div {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-bottom: 1px solid var(--line);
    }

    .table-preview div:last-child { border-bottom: 0; }
    .table-preview span { padding: 9px; font-size: 0.72rem; }
    .table-preview span:nth-child(2) { background: var(--coral-soft); }

    .avatar-cluster {
      position: relative;
      width: 170px;
      height: 130px;
    }

    .avatar-cluster img {
      position: absolute;
      width: 78px;
      height: 78px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid var(--coral);
      background: #fff;
    }

    .avatar-cluster img:nth-child(1) { left: 44px; top: 14px; z-index: 3; }
    .avatar-cluster img:nth-child(2) { left: 8px; top: 44px; z-index: 2; }
    .avatar-cluster img:nth-child(3) { right: 8px; top: 44px; z-index: 1; }

    .poster {
      width: 120px;
      aspect-ratio: 3 / 4;
      display: grid;
      place-items: center;
      text-align: center;
      padding: 14px;
      background: var(--ink);
      color: #fff;
      border: 6px solid var(--coral);
      font-family: 'ChillHuoKai Con', serif;
      font-size: 1.7rem;
      line-height: 1.05;
    }

    .phone {
      width: 118px;
      height: 148px;
      border: 4px solid var(--ink);
      border-radius: 18px;
      background: #fff;
      padding: 12px;
      box-shadow: 8px 8px 0 var(--sky-blue);
    }

    .phone .mini-line:nth-child(1) { background: var(--coral); }
    .phone .mini-line:nth-child(2) { width: 72%; }
    .phone .mini-line:nth-child(3) { width: 48%; background: var(--newyork-red); }

    .stack {
      position: relative;
      width: 164px;
      height: 118px;
    }

    .stack i {
      position: absolute;
      inset: 0;
      display: block;
      border: 2px solid var(--ink);
      border-radius: 7px;
      background: #fff;
      box-shadow: 5px 5px 0 rgba(26,26,46,0.12);
    }

    .stack i:nth-child(1) { transform: translate(18px, 16px) rotate(4deg); background: var(--sky-blue); }
    .stack i:nth-child(2) { transform: translate(9px, 8px) rotate(-2deg); background: var(--coral-soft); }
    .stack i:nth-child(3) { transform: translate(0, 0); }

    .modal-preview {
      width: min(230px, 100%);
      height: 130px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: rgba(26,26,46,0.86);
    }

    .modal-preview > div {
      width: 72%;
      height: 82px;
      background: var(--cream);
      border-radius: 7px;
      border-top: 16px solid var(--coral);
    }

    .component-card[data-kind="dark"] .preview {
      background: var(--ink);
    }

    .component-card[data-kind="dark"] .mini-card,
    .component-card[data-kind="dark"] .quote-box {
      background: transparent;
      color: #fff;
      border-color: rgba(255,255,255,0.22);
      box-shadow: none;
    }

    .empty-state {
      display: none;
      padding: 36px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      color: var(--ink-light);
      background: #fff;
      text-align: center;
    }

    .empty-state.show { display: block; }

    @media (max-width: 1120px) {
      .component-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .hero { grid-template-columns: 1fr; }
      .palette { grid-template-columns: repeat(3, 1fr); }
    }

    @media (max-width: 820px) {
      .shell { display: block; }
      .sidebar {
        position: relative;
        height: auto;
        padding: 20px;
      }
      .toc {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        max-height: 230px;
        overflow: auto;
      }
      .main { padding: 24px 16px 48px; }
      .component-grid { grid-template-columns: 1fr; }
      .palette { grid-template-columns: 1fr; }
      h1 { font-size: clamp(3rem, 16vw, 5rem); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <aside class="sidebar">
      <div class="brand-lockup">
        <img src="./avatar.jpg" alt="Serena avatar">
        <div>
          <h2 class="brand-title">Serena</h2>
          <p class="brand-subtitle">Component Preview</p>
        </div>
      </div>
      <input class="search-box" id="search" type="search" placeholder="搜索组件名称或场景">
      <div class="filter-list" id="filters"></div>
      <nav class="toc" id="toc" aria-label="组件目录"></nav>
    </aside>

    <main class="main">
      <section class="hero">
        <div>
          <span class="hero-kicker">Serena Design System</span>
          <h1>组件预览总览</h1>
          <p>这页把 `references/components.md` 里的组件方向集中成一张可浏览的地图。真正做页面时仍从组件库复制完整代码，这里负责快速看风格、节奏和品牌色。</p>
        </div>
        <div class="palette" aria-label="品牌色">
          <div class="swatch coral"><span>Coral</span><small>#F07040</small></div>
          <div class="swatch red"><span>New Yorker Red</span><small>#CC2936</small></div>
          <div class="swatch blue"><span>Sky Blue</span><small>#2B7FD8</small></div>
        </div>
      </section>

      <div class="section-heading">
        <h2>全部组件</h2>
        <span id="count"></span>
      </div>
      <section class="component-grid" id="grid"></section>
      <div class="empty-state" id="empty">没有找到匹配的组件。</div>
    </main>
  </div>

      { id: 40, name: '交互清单', category: '交互', type: 'checklist', desc: '可点击打勾的任务清单。' },
      { id: 41, name: '手写明信片', category: '结尾', type: 'postcard', desc: '寄语、总结、课后思考。' },
      { id: 42, name: '点击弹窗详情', category: '作品集', type: 'modal', desc: '作品卡片点击展开详情。' },
      { id: 43, name: '缩略图轨道 + 侧面板', category: '作品集', type: 'gallery', desc: '类 gallery app 的图片浏览。' },
      { id: 44, name: '悬停翻转卡片', category: '作品集', type: 'flip', desc: '正面图片、背面文字介绍。' },
      { id: 45, name: '结尾 Quote 系列', category: '结尾', kind: 'dark', type: 'quote', desc: '巨大引号、肖像分割、字幕式结尾等。' }
    ];

    const categories = ['全部', ...Array.from(new Set(components.map(item => item.category)))];
    let activeCategory = '全部';

    const grid = document.getElementById('grid');
    const toc = document.getElementById('toc');
    const filters = document.getElementById('filters');
    const search = document.getElementById('search');
    const count = document.getElementById('count');
    const empty = document.getElementById('empty');

    function previewMarkup(item) {
      const title = item.name.split('（')[0];
      const line = '<div class="mini-line"></div><div class="mini-line short"></div>';
      const patterns = {
        card: `<div class="mini-card"><p class="mini-title">${title}</p>${line}</div>`,
        header: `<div class="quote-box"><div class="quote-mark">${String(item.id).padStart(2, '0')}</div><strong>${title}</strong></div>`,
        quote: `<div class="quote-box"><div class="quote-mark">“</div><strong>${title}</strong><p>重要观点放在这里。</p></div>`,
        code: `<div class="code-box"><span class="code-dot"></span><span class="code-dot" style="background:var(--sky-blue)"></span><span class="code-dot" style="background:var(--newyork-red)"></span><br>const color = "Serena";<br>render(component);</div>`,
        phone: `<div class="phone">${line}${line}</div>`,
        chat: `<div><span class="pill">Serena</span><br><br><span class="pill" style="border-color:var(--sky-blue)">Reply</span></div>`,
        nav: `<div class="mini-card" style="box-shadow:none"><div class="flow"><span>Home</span><span>Work</span><span>About</span></div></div>`,
        flow: `<div class="flow"><span>Step 1</span><b class="arrow">→</b><span>Step 2</span><b class="arrow">→</b><span>Step 3</span></div>`,
        table: `<div class="table-preview"><div><span>Do</span><span>Don't</span></div><div><span>清晰</span><span>默认样式</span></div><div><span>品牌色</span><span>旧色板</span></div></div>`,
        avatar: `<div class="avatar-cluster"><img src="./avatar.jpg" alt=""><img src="./character.png" alt=""><img src="./avatar.jpg" alt=""></div>`,
        pills: `<div class="flow"><span>全部</span><span style="background:var(--coral);color:#fff">选中</span><span>待看</span></div>`,
        book: `<div class="poster" style="background:#fff;color:var(--ink)">Serena<br>Notes</div>`,
        modal: `<div class="modal-preview"><div></div></div>`,
        calendar: `<div class="table-preview"><div><span>Mon</span><span>☺</span></div><div><span>Tue</span><span>✦</span></div><div><span>Wed</span><span>○</span></div></div>`,
        button: `<div class="flow"><span style="background:var(--coral);color:#fff">开始</span><span style="border-color:var(--sky-blue)">了解更多</span></div>`,
        ticket: `<div class="mini-card" style="border-style:dashed"><p class="mini-title">BOARDING</p>${line}</div>`,
        hotel: `<div class="mini-card"><p class="mini-title">STAY</p><div class="flow"><span>Room</span><span>Date</span></div></div>`,
        newspaper: `<div class="mini-card" style="box-shadow:none"><p class="mini-title" style="border-bottom:2px solid var(--ink)">NEWS</p>${line}${line}</div>`,
        minimal: `<div class="quote-box"><div style="width:56px;height:2px;background:var(--coral);margin:0 auto 18px"></div><strong>留白</strong></div>`,
        poster: `<div class="poster">${title.slice(0, 6)}</div>`,
        stack: `<div class="stack"><i></i><i></i><i></i></div>`,
        tabs: `<div class="mini-card" style="box-shadow:none"><div class="flow"><span style="border-color:var(--coral)">A</span><span>B</span><span>C</span></div>${line}</div>`,
        accordion: `<div class="mini-card" style="box-shadow:none"><p class="mini-title">01  展开项</p>${line}<p class="mini-title">02  收起项</p></div>`,
        carousel: `<div class="quote-box"><strong>${title}</strong><div class="flow" style="margin-top:18px"><span>←</span><span>→</span></div></div>`,
        flip: `<div class="mini-card" style="transform:rotateY(-14deg);box-shadow:10px 10px 0 var(--sky-blue)"><p class="mini-title">Front / Back</p>${line}</div>`,
        reveal: `<div class="mini-card" style="background:var(--coral);color:#fff"><p class="mini-title">Hover</p><p>揭示内容</p></div>`,
        checklist: `<div class="mini-card" style="box-shadow:none"><p>☑ 任务一</p><p>☐ 任务二</p><p>☐ 任务三</p></div>`,
        postcard: `<div class="mini-card" style="transform:rotate(-2deg);border-style:dashed"><p class="mini-title">给 Serena</p>${line}</div>`,
        gallery: `<div class="mini-card" style="display:grid;grid-template-columns:38px 1fr;gap:8px;box-shadow:none"><div style="background:var(--ink)"></div><div style="background:var(--sky-blue)"></div></div>`
      };
      return patterns[item.type] || patterns.card;
    }

    function renderFilters() {
      filters.innerHTML = categories.map(category => `
        <button class="filter-btn ${category === activeCategory ? 'active' : ''}" data-category="${category}">
          ${category}
        </button>
      `).join('');
      filters.querySelectorAll('button').forEach(button => {
        button.addEventListener('click', () => {
          activeCategory = button.dataset.category;
          renderFilters();
          renderCards();
        });
      });
    }

    function renderToc(items) {
      toc.innerHTML = items.map(item => `
        <a href="#component-${item.id}">
          <span>${String(item.id).padStart(2, '0')}</span>
          ${item.name}
        </a>
      `).join('');
    }

    function renderCards() {
      const keyword = search.value.trim().toLowerCase();
      const filtered = components.filter(item => {
        const matchCategory = activeCategory === '全部' || item.category === activeCategory;
        const haystack = `${item.name} ${item.category} ${item.desc}`.toLowerCase();
        return matchCategory && haystack.includes(keyword);
      });

      grid.innerHTML = filtered.map(item => `
        <article class="component-card" id="component-${item.id}" data-kind="${item.kind || 'light'}">
          <div class="preview">${previewMarkup(item)}</div>
          <div class="meta">
            <div class="meta-row">
              <span class="number">${String(item.id).padStart(2, '0')}</span>
              <span class="tag">${item.category}</span>
            </div>
            <h3>${item.name}</h3>
            <p>${item.desc}</p>
          </div>
        </article>
      `).join('');

      count.textContent = `${filtered.length} / ${components.length} components`;
      empty.classList.toggle('show', filtered.length === 0);
      renderToc(filtered);
    }

    search.addEventListener('input', renderCards);
    renderFilters();
    renderCards();
  </script>
</body>
</html>
