<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Serena Design System · 45 Components Preview</title>
<style>
@font-face {
  font-family: 'ChillHuoKai Con';
  src: url('./ChillHuoKai_ConRegular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

:root {
  --coral: #F07040;
  --coral-soft: #FFF3EE;
  --red: #CC2936;
  --blue: #2B7FD8;
  --blue-soft: #EEF6FF;
  --ink: #1A1A2E;
  --ink-light: #4A4A5A;
  --ink-faint: #8A8A9A;
  --cream: #fefcf6;
  --cream-dark: #faf6eb;
  --line: #e8e4dc;
  --paper: #fff;
}

*, *::before, *::after { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
  color: var(--ink);
  background: var(--cream);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  overflow-x: hidden;
}
button, input { font: inherit; }
img { display: block; max-width: 100%; }

.site-nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  gap: 18px;
  height: 58px;
  padding: 0 clamp(16px, 4vw, 56px);
  overflow-x: auto;
  border-bottom: 1px solid rgba(26,26,46,.08);
  background: rgba(254,252,246,.92);
  backdrop-filter: blur(14px);
}
.site-nav::-webkit-scrollbar { display: none; }
.nav-brand {
  flex: 0 0 auto;
  display: flex;
  align-items: center;
  gap: 9px;
  font-family: 'ChillHuoKai Con', "Noto Serif SC", serif;
  font-size: 1.25rem;
  white-space: nowrap;
}
.nav-brand img {
  width: 30px;
  height: 30px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid var(--coral);
}
.nav-tabs {
  display: flex;
  gap: 5px;
  flex: 0 0 auto;
}
.nav-tab {
  border: 0;
  border-radius: 999px;
  padding: 6px 12px;
  background: transparent;
  color: var(--ink-light);
  font-size: .72rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all .2s ease;
}
.nav-tab:hover { background: rgba(43,127,216,.08); }
.nav-tab.active { background: var(--blue); color: #fff; }

.hero {
  min-height: 640px;
  display: grid;
  grid-template-columns: minmax(0, 1.05fr) minmax(300px, .95fr);
  align-items: center;
  gap: clamp(32px, 6vw, 84px);
  padding: clamp(56px, 8vw, 100px) clamp(24px, 6vw, 96px);
  background:
    linear-gradient(135deg, rgba(240,112,64,.18), transparent 42%),
    linear-gradient(315deg, rgba(43,127,216,.14), transparent 36%),
    var(--cream);
}
.hero > * { min-width: 0; }
.hero-kicker {
  display: inline-flex;
  align-items: center;
  gap: 9px;
  padding: 5px 12px;
  border-radius: 999px;
  background: var(--ink);
  color: #fff;
  font-size: .72rem;
  letter-spacing: .08em;
  text-transform: uppercase;
}
.hero h1 {
  margin: 22px 0 18px;
  max-width: 820px;
  font-family: 'ChillHuoKai Con', "Noto Serif SC", serif;
  font-size: clamp(4.6rem, 12vw, 10rem);
  font-weight: 400;
  line-height: .88;
  letter-spacing: 0;
}
.hero h1 span { color: var(--coral); }
.hero-copy {
  max-width: 680px;
  color: var(--ink-light);
  font-size: clamp(1rem, 1.5vw, 1.22rem);
  line-height: 1.9;
  overflow-wrap: anywhere;
}
.hero-panel {
  position: relative;
  min-width: 0;
  max-width: 100%;
  padding: 26px;
  border-radius: 18px;
  background: #fff;
  border: 2px solid var(--ink);
  box-shadow: 14px 14px 0 var(--coral);
}
.hero-panel::before {
  content: '';
  position: absolute;
  top: 18px;
  right: 18px;
  width: 42px;
  height: 42px;
  border-radius: 50%;
  border: 8px solid var(--blue);
  opacity: .22;
}
.hero-card {
  display: grid;
  gap: 18px;
}
.hero-avatar {
  width: 86px;
  height: 86px;
  border-radius: 50%;
  object-fit: cover;
  border: 4px solid var(--coral);
}
.hero-panel h2 {
  margin: 0;
  font-family: "Noto Serif SC", serif;
  font-size: 1.55rem;
  line-height: 1.25;
}
.hero-panel p { margin: 0; color: var(--ink-light); font-size: .9rem; }
.hero-panel h2,
.hero-panel p {
  overflow-wrap: anywhere;
}
.palette { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
.swatch {
  min-height: 82px;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  gap: 2px;
  padding: 12px;
  border-radius: 12px;
  color: #fff;
  font-size: .68rem;
  font-weight: 700;
}
.swatch small { opacity: .78; font-weight: 500; }
.swatch.coral { background: var(--coral); }
.swatch.red { background: var(--red); }
.swatch.blue { background: var(--blue); }

.sec {
  padding: clamp(64px, 9vh, 104px) clamp(20px, 6vw, 90px);
}
.sec:nth-of-type(odd) { background: var(--cream-dark); }
.sec-heading {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 46px;
}
.sec-heading h2 {
  margin: 0;
  font-family: 'ChillHuoKai Con', "Noto Serif SC", serif;
  font-size: clamp(2.7rem, 6vw, 5.2rem);
  font-weight: 400;
  line-height: .96;
}
.sec-heading p {
  max-width: 460px;
  margin: 0;
  color: var(--ink-light);
  font-size: .9rem;
  text-align: right;
}

.cb {
  margin-bottom: 58px;
}
.cb:last-child { margin-bottom: 0; }
.cb-h {
  display: flex;
  align-items: baseline;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 8px;
}
.cb-id {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: .72rem;
  color: var(--blue);
  font-weight: 700;
}
.cb-name {
  font-family: "Noto Serif SC", serif;
  font-size: 1.12rem;
  font-weight: 800;
}
.pills {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}
.pill {
  display: inline-flex;
  padding: 2px 9px;
  border-radius: 999px;
  background: rgba(43,127,216,.09);
  color: var(--blue);
  font-size: .64rem;
  font-weight: 700;
}
.demo {
  padding: clamp(24px, 3.6vw, 46px);
  overflow: hidden;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 2px 14px rgba(26,26,46,.04);
}
.demo.dark {
  background: var(--ink);
  color: #fff;
}
.g2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 20px; }
.g3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 20px; }
.g4 { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 14px; }

.mag-card {
  padding: 30px 24px;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 4px 20px rgba(26,26,46,.05);
}
.mag-card h3 {
  margin: 0;
  min-height: 54px;
  font-family: "Noto Serif SC", serif;
  font-size: 1.42rem;
  line-height: 1.2;
}
.mag-card p { margin: 14px 0 0; color: var(--ink-light); font-size: .82rem; }
.mag-card .aux { color: var(--blue); font-size: .7rem; font-weight: 700; }

.num-card {
  position: relative;
  min-height: 140px;
  padding: 26px 22px;
  overflow: hidden;
  border-radius: 14px;
  background: #fff;
}
.num-card .big {
  position: absolute;
  top: -22px;
  right: 10px;
  font-family: 'ChillHuoKai Con', serif;
  font-size: 6.4rem;
  color: var(--coral);
  opacity: .18;
  line-height: 1;
}
.num-card h3 { position: relative; margin: 0 0 8px; font-family: "Noto Serif SC", serif; }
.num-card p { position: relative; margin: 0; color: var(--ink-light); font-size: .82rem; }

.numgrid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 16px;
  max-width: 620px;
}
.numgrid-card {
  position: relative;
  overflow: hidden;
  min-height: 132px;
  padding: 24px 20px;
  border-radius: 14px;
  background: #fff;
  box-shadow: 0 2px 12px rgba(26,26,46,.04);
}
.numgrid-card::before {
  content: attr(data-num);
  position: absolute;
  top: -12px;
  right: 12px;
  font-family: 'ChillHuoKai Con', serif;
  font-size: 4.4rem;
  color: var(--blue);
  opacity: .15;
  line-height: 1;
}
.numgrid-card h4 {
  position: relative;
  margin: 0 0 7px;
  color: var(--coral);
  font-size: .92rem;
}
.numgrid-card p {
  position: relative;
  margin: 0;
  color: var(--ink-light);
  font-size: .8rem;
}
.numgrid-card.full { grid-column: 1 / -1; }

.tag-card {
  padding: 20px;
  border-radius: 14px;
  background: #fff;
  border: 1px solid var(--line);
}
.tag-card .tag {
  display: inline-block;
  margin-bottom: 13px;
  padding: 3px 10px;
  border-radius: 999px;
  background: var(--coral-soft);
  color: var(--coral);
  font-size: .68rem;
  font-weight: 800;
}
.tag-card:nth-child(2) .tag { background: var(--blue-soft); color: var(--blue); }
.tag-card:nth-child(3) .tag { background: rgba(204,41,54,.09); color: var(--red); }
.tag-card h3 { margin: 0 0 6px; font-size: 1rem; }
.tag-card p { margin: 0; color: var(--ink-light); font-size: .8rem; }

.icon-card {
  display: flex;
  min-height: 130px;
  overflow: hidden;
  border-radius: 14px;
  background: #fff;
  box-shadow: 0 1px 4px rgba(26,26,46,.05);
}
.icon-card .ia {
  flex: 0 0 30%;
  display: grid;
  place-items: center;
  background: var(--coral);
  color: #fff;
  font-size: 2rem;
  font-weight: 900;
}
.icon-card:nth-child(2) .ia { background: var(--blue); }
.icon-card:nth-child(3) .ia { background: var(--red); }
.icon-card .ic { flex: 1; padding: 18px; display: grid; align-content: center; }
.icon-card h3 { margin: 0 0 5px; font-size: .95rem; }
.icon-card p { margin: 0; color: var(--ink-light); font-size: .78rem; }

.quote {
  position: relative;
  max-width: 680px;
  padding: 38px 42px;
  border-radius: 16px;
  border: 2px solid var(--coral);
  background: var(--cream);
}
.quote::before {
  content: '“';
  position: absolute;
  top: -20px;
  left: 22px;
  font-family: 'ChillHuoKai Con', serif;
  font-size: 6rem;
  color: var(--coral);
  opacity: .42;
  line-height: 1;
}
.quote p {
  position: relative;
  margin: 0;
  font-family: "Noto Serif SC", serif;
  font-size: clamp(1.1rem, 2vw, 1.45rem);
  font-weight: 800;
  line-height: 1.85;
}
.note {
  position: relative;
  padding: 24px 28px;
  border: 1.5px dashed rgba(240,112,64,.45);
  border-radius: 12px;
  background: #fff;
}
.note .label {
  position: absolute;
  top: -12px;
  left: 20px;
  padding: 0 8px;
  background: var(--cream);
  color: var(--coral);
  font-family: "ChillHuoKai Con", serif;
  font-size: 1.18rem;
}
.note p { margin: 0; color: var(--ink-light); font-size: .9rem; line-height: 1.9; }

.code-mac {
  overflow: hidden;
  border-radius: 14px;
  box-shadow: 0 12px 38px rgba(26,26,46,.16);
  background: #1a1b26;
}
.code-mac .bar {
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 11px 14px;
  background: #2d2d3a;
}
.code-mac i { width: 11px; height: 11px; border-radius: 50%; display: block; }
.code-mac i:nth-child(1) { background: #ff5f56; }
.code-mac i:nth-child(2) { background: #ffbd2e; }
.code-mac i:nth-child(3) { background: #27c93f; }
.code-mac .file { flex: 1; text-align: center; color: #8A8A9A; font: .68rem ui-monospace, monospace; }
.code-mac pre {
  margin: 0;
  padding: 22px;
  color: #a9b1d6;
  font: .78rem/1.9 ui-monospace, SFMono-Regular, Menlo, monospace;
  white-space: pre-wrap;
}
.kw { color: #bb9af7; }
.fn { color: #7aa2f7; }
.st { color: #9ece6a; }
.cm { color: #565f89; }
.nm { color: #ff9e64; }
.code-paper {
  position: relative;
  padding: 28px 24px 24px 48px;
  border: 1px solid #e8e4d9;
  border-radius: 5px;
  background: #fffef8;
  box-shadow: 3px 4px 0 #e8e4d9;
}
.code-paper::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  left: 32px;
  width: 1px;
  background: rgba(204,41,54,.2);
}
.code-paper pre { margin: 0; font: .78rem/2 ui-monospace, monospace; white-space: pre-wrap; }

.chat {
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 520px;
}
.bubble {
  max-width: 82%;
  padding: 13px 18px;
  border-radius: 18px;
  font-size: .88rem;
}
.bubble.user {
  align-self: flex-end;
  background: var(--coral);
  color: #fff;
  border-bottom-right-radius: 5px;
}
.bubble.ai {
  align-self: flex-start;
  background: var(--blue);
  color: #fff;
  border-bottom-left-radius: 5px;
}

.flow {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  justify-content: center;
}
.flow span {
  padding: 9px 15px;
  border-radius: 999px;
  background: #fff;
  border: 1.5px solid var(--coral);
  font-size: .78rem;
  font-weight: 800;
}
.flow .arr { color: var(--blue); font-weight: 900; }

.compare {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
.compare-col {
  padding: 24px;
  border-radius: 16px;
  background: #fff;
  border: 2px solid var(--line);
}
.compare-col.do { border-color: var(--blue); }
.compare-col.dont { border-color: var(--red); }
.compare-col h3 { margin: 0 0 14px; font-size: 1rem; }
.compare-col ul { margin: 0; padding-left: 18px; color: var(--ink-light); font-size: .86rem; line-height: 2; }

.ed-layout {
  display: grid;
  grid-template-columns: 260px minmax(0,1fr);
  gap: 32px;
}
.ed-side {
  border-top: 4px solid var(--ink);
  padding-top: 20px;
}
.ed-side .vs {
  display: inline-flex;
  padding: 2px 9px;
  margin-bottom: 14px;
  background: var(--red);
  color: #fff;
  font-size: .68rem;
  font-weight: 900;
}
.ed-side h3 { margin: 0; font-family: "Noto Serif SC", serif; font-size: 1.65rem; line-height: 1.2; }
.ed-side p { color: var(--ink-light); font-size: .82rem; }
.ed-row {
  display: grid;
  grid-template-columns: 46px 1fr 1fr;
  gap: 16px;
  padding: 18px 0;
  border-bottom: 1px solid var(--line);
}
.ed-row .n { color: var(--blue); font: 700 .78rem ui-monospace, monospace; }
.ed-row h4 { margin: 0 0 5px; font-size: .88rem; }
.ed-row p { margin: 0; color: var(--ink-light); font-size: .8rem; }
.table-preview {
  max-width: 760px;
  border-top: 2px solid var(--ink);
  border-bottom: 2px solid var(--ink);
}
.table-preview .ed-row:last-child { border-bottom: 0; }

.avatar-cluster {
  position: relative;
  width: 260px;
  height: 230px;
  margin: 0 auto;
}
.avatar-cluster .ring {
  position: absolute;
  inset: 18px;
  border: 2px dashed var(--blue);
  border-radius: 50%;
  animation: spin 18s linear infinite;
}
.avatar-cluster img {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 116px;
  height: 116px;
  transform: translate(-50%, -50%);
  border-radius: 50%;
  object-fit: cover;
  border: 5px solid var(--coral);
  background: #fff;
}
.orb {
  position: absolute;
  padding: 5px 11px;
  border-radius: 999px;
  background: var(--coral);
  color: #fff;
  font-size: .72rem;
  font-weight: 800;
}
.orb:nth-of-type(1) { top: 12px; right: 22px; }
.orb:nth-of-type(2) { bottom: 36px; left: -8px; background: var(--blue); }
.orb:nth-of-type(3) { bottom: 12px; right: 0; background: var(--red); }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes rise {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

.filter-tags { display: flex; gap: 8px; flex-wrap: wrap; }
.filter-tag {
  padding: 8px 13px;
  border-radius: 999px;
  background: #fff;
  border: 1px solid var(--line);
  color: var(--ink-light);
  font-size: .78rem;
  cursor: pointer;
}
.filter-tag.active { background: var(--coral); color: #fff; border-color: var(--coral); }

.book-card {
  max-width: 370px;
  padding: 26px 24px;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 8px 32px rgba(26,26,46,.1);
}
.book-card .badge { display:inline-block; padding: 3px 9px; border-radius: 999px; background: var(--blue-soft); color: var(--blue); font-size: .68rem; font-weight: 800; }
.book-card h3 { margin: 12px 0 4px; font-family: "Noto Serif SC", serif; }
.book-card .author { margin: 0 0 12px; color: var(--ink-faint); font-size: .78rem; }
.book-card blockquote { margin: 0; padding-left: 13px; border-left: 3px solid var(--coral); color: var(--ink-light); font-size: .85rem; line-height: 1.8; }

.modal-demo {
  min-height: 210px;
  display: grid;
  place-items: center;
  border-radius: 16px;
  background: rgba(26,26,46,.88);
}
.modal-box {
  width: min(440px, 88%);
  padding: 24px;
  border-radius: 16px;
  background: var(--cream);
}
.modal-box h3 { margin: 0 0 10px; font-family: "Noto Serif SC", serif; }
.modal-box p { margin: 0; color: var(--ink-light); font-size: .85rem; }

.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  max-width: 560px;
}
.cal-cell {
  aspect-ratio: 1;
  display: grid;
  place-items: center;
  border-radius: 12px;
  background: #fff;
  border: 1px solid var(--line);
  color: var(--ink-light);
  font-size: .82rem;
}
.cal-cell.hot { background: var(--coral); color: #fff; border-color: var(--coral); }
.cal-cell.blue { background: var(--blue); color: #fff; border-color: var(--blue); }

.cta-row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
.cta-btn {
  border: 0;
  border-radius: 999px;
  padding: 13px 24px;
  background: var(--coral);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
  transition: transform .2s ease;
}
.cta-btn:hover { transform: translateY(-2px); }
.cta-btn.secondary { background: var(--blue); }
.cta-btn.outline { background: transparent; color: var(--ink); border: 2px solid var(--ink); }

.ticket {
  position: relative;
  display: flex;
  overflow: hidden;
  border: 2px dashed #cfc5a8;
  border-radius: 6px;
  background: var(--cream-dark);
}
.ticket::before {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  right: 28%;
  width: 2px;
  background: repeating-linear-gradient(to bottom, transparent 0, transparent 5px, #cfc5a8 5px, #cfc5a8 12px);
}
.ticket-main { flex: 1; padding: 24px; }
.ticket-side { width: 28%; padding: 18px; background: #f5f0e3; display: grid; place-items: center; text-align: center; }
.ticket .route { display: flex; align-items: center; gap: 16px; margin: 14px 0; font: 700 1.8rem ui-monospace, monospace; }
.ticket .route small { color: var(--ink-faint); font-size: .62rem; }
.ticket label { display:block; color: var(--ink-faint); font-size: .6rem; letter-spacing:.1em; text-transform: uppercase; }
.ticket span { font-weight: 800; }

.hotel {
  border-top: 4px solid var(--ink);
  padding: 30px 0 0;
}
.hotel h3 { margin: 0; font-family: "Noto Serif SC", serif; font-size: 1.8rem; }
.hotel .sub { margin: 3px 0 20px; color: var(--ink-light); font-style: italic; }
.hotel-grid { display: flex; flex-wrap: wrap; border-top: 1px solid var(--line); }
.hotel-item { flex: 1 1 130px; padding: 12px 18px 12px 0; border-right: 1px solid var(--line); }
.hotel-item:last-child { border-right: 0; }

function sectionTemplate(section) {
  return `<section class="sec" id="${section.id}">
    <div class="sec-heading">
      <h2>${section.title}</h2>
      <p>${section.desc}</p>
    </div>
    ${section.items.map(item => `
      <div class="cb">
        <div class="cb-h"><span class="cb-id">#${item.id}</span><span class="cb-name">${item.name}</span></div>
        <div class="pills">${item.tags.map(tag => `<span class="pill">${tag}</span>`).join('')}</div>
        <div class="demo ${['darkQuote','darkReveal','ending','film'].includes(item.demo) ? 'dark' : ''}">
          ${demo[item.demo]()}
        </div>
      </div>
    `).join('')}
  </section>`;
}

document.getElementById('sections').innerHTML = sections.map(sectionTemplate).join('');
document.getElementById('navTabs').innerHTML = sections.map((section, i) => `<button class="nav-tab ${i === 0 ? 'active' : ''}" data-target="${section.id}">${section.title}</button>`).join('');

const navTabs = document.querySelectorAll('.nav-tab');
navTabs.forEach(tab => tab.addEventListener('click', () => document.getElementById(tab.dataset.target).scrollIntoView({ behavior: 'smooth' })));

window.addEventListener('scroll', () => {
  let current = sections[0].id;
  sections.forEach(section => {
    const el = document.getElementById(section.id);
    if (window.scrollY >= el.offsetTop - 120) current = section.id;
  });
  navTabs.forEach(tab => tab.classList.toggle('active', tab.dataset.target === current));
});

function switchTab(el, index) {
  const root = el.closest('.demo');
  root.querySelectorAll('.tab-item').forEach(tab => tab.classList.remove('active'));
  root.querySelectorAll('.tab-panel').forEach(panel => panel.classList.remove('active'));
  el.classList.add('active');
  root.querySelectorAll('.tab-panel')[index].classList.add('active');
}

function toggleAcc(header) {
  const item = header.parentElement;
  const wasOpen = item.classList.contains('open');
  item.parentElement.querySelectorAll('.acc-item').forEach(node => node.classList.remove('open'));
  if (!wasOpen) item.classList.add('open');
}

let slideIndex = 0;
function moveSlide(direction) {
  const slides = document.getElementById('slides');
  slideIndex = (slideIndex + direction + 3) % 3;
  slides.style.transform = `translateX(-${slideIndex * 100}%)`;
}

function flipStack() {
  const stack = document.getElementById('stack');
  const first = stack.firstElementChild;
  first.style.transform = 'translateX(-120%) rotate(-5deg)';
  first.style.opacity = '0';
  setTimeout(() => {
    stack.appendChild(first);
    first.style.transform = '';
    first.style.opacity = '';
  }, 320);
}
</script>
